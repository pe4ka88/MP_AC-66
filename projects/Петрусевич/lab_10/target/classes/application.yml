server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:sqlite:lab5_users.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: "lab5-client"
            client-secret: "9bTbzUYy1yxxTvLiT1W2oKyKsFrSynDJ"
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email
        provider:
          keycloak:
            issuer-uri: http://localhost:8081/realms/lab-realm
            user-name-attribute: preferred_username

logging:
  level:
    org.springframework.security.web.authentication: TRACE
    org.springframework.security.web.authentication.logout: TRACE
    com.university.lab5.security: DEBUG
